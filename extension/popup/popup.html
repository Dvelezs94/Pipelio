<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Pipelio Scraper</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <h1>Pipelio</h1>
      <p class="subtitle">Listing scraper</p>
    </header>

    <section class="card">
      <label for="apiUrl">App API URL</label>
      <input id="apiUrl" type="url" placeholder="http://localhost:3000" />

      <label for="apiKey">Scraper API key</label>
      <input id="apiKey" type="password" placeholder="SCRAPER_API_KEY from .env" autocomplete="off" />

      <label for="workspaceId">Workspace ID (optional)</label>
      <div class="row">
        <input id="workspaceId" type="text" placeholder="Leave empty for server default" />
        <button id="loadWorkspaces" type="button" class="secondary" title="Fetch workspaces">↻</button>
      </div>
      <select id="workspaceSelect" class="hidden"></select>

      <label class="checkbox">
        <input id="autoScrape" type="checkbox" checked />
        Auto-scrape supported listing sites
      </label>

      <div class="actions">
        <button id="save" type="button">Save settings</button>
        <button id="test" type="button" class="secondary">Test API</button>
      </div>
    </section>

    <section class="card">
      <p id="pageInfo" class="muted">Open a listing page to scrape.</p>
      <button id="scrapeNow" type="button" class="full">Scrape this page now</button>
      <p id="stats" class="stats muted"></p>
      <p id="status" class="status"></p>
    </section>

    <section class="card sites">
      <p class="label">Supported sites</p>
      <p class="muted small">
        Clutch · Crunchbase · G2 · Capterra · Product Hunt · Y Combinator · Wellfound · GoodFirms · GetApp · Software Advice · Built In · SoftwareSuggest · GitHub org search
      </p>
    </section>

    <script src="../config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
